[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "liteparse"
version = "1.2.0"
description = "Python wrapper for LiteParse - fast, lightweight PDF and document parsing"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Logan Markewich", email = "logan@runllama.ai" },
]
keywords = ["pdf", "parsing", "ocr", "document", "text-extraction"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Text Processing",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/run-llama/liteparse"
Documentation = "https://github.com/run-llama/liteparse#readme"
Repository = "https://github.com/run-llama/liteparse"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "mypy>=1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["liteparse"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_ignores = true
